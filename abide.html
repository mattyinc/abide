/* ============================================================
   Design system — from UI/UX Pro Max query for "Abide"
   Pattern: Quiet Field Journal · Type: Lora / Manrope
   Palette: warm cream, journal brown, streak amber, habit green,
   grace violet. Light default, manual dark toggle.
   ============================================================ */
:root{
  color-scheme: light;
  --bg:#FFFBEB;
  --card:#FFFFFF;
  --muted:#FBF4E4;
  --border:#F0E6CF;
  --border-strong:#DFD0AE;
  --ink:#0F172A;
  --sub:#57534E;
  --faint:#A39E93;
  --brand:#92400E;
  --brand-hover:#7C3808;
  --on-brand:#FFFFFF;
  --amber:#D97706;
  --amber-soft:#FCEED3;
  --green:#059669;
  --green-text:#047857;
  --green-soft:#E4F3EC;
  --grace:#6366F1;
  --grace-text:#4F52C4;
  --grace-soft:#ECEEFD;
  --danger:#DC2626;
  --ring:#D97706;
  --shadow:0 1px 2px rgba(122,74,16,.05), 0 3px 10px rgba(122,74,16,.04);
  --font-serif:'Lora', Georgia, serif;
  --font-sans:'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
}
html.dark{
  color-scheme: dark;
  --bg:#17130E;
  --card:#211B14;
  --muted:#2A231A;
  --border:#372E21;
  --border-strong:#4E4230;
  --ink:#F4EDDF;
  --sub:#C7BBA5;
  --faint:#877D6B;
  --brand:#E9A23B;
  --brand-hover:#F2B354;
  --on-brand:#221503;
  --amber:#E9A23B;
  --amber-soft:#3A2C14;
  --green:#34C08B;
  --green-text:#5FD6A8;
  --green-soft:#1B2F26;
  --grace:#9BA3F5;
  --grace-text:#B3B9F8;
  --grace-soft:#252745;
  --danger:#F87171;
  --ring:#E9A23B;
  --shadow:0 1px 2px rgba(0,0,0,.25), 0 3px 10px rgba(0,0,0,.2);
}

*{box-sizing:border-box; margin:0; padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-sans);
  font-size:15.5px;
  line-height:1.55;
  min-height:100vh;
  transition:background-color .25s ease, color .25s ease;
}
#app{max-width:600px; margin:0 auto; padding:20px 20px 72px;}

h1,h2,h3{font-family:var(--font-serif); font-weight:600; line-height:1.25;}
button{font-family:inherit; font-size:inherit; color:inherit; background:none; border:none; cursor:pointer;}
input,textarea,select{
  font-family:var(--font-sans); font-size:15px; color:var(--ink);
  background:var(--card); border:1px solid var(--border-strong);
  border-radius:10px; padding:9px 12px; width:100%;
}
textarea{resize:vertical; min-height:74px; line-height:1.5;}
input:hover,textarea:hover,select:hover{border-color:var(--brand);}
:focus{outline:none;}
:focus-visible{outline:2px solid var(--ring); outline-offset:2px; border-radius:6px;}
input:focus-visible,textarea:focus-visible,select:focus-visible{outline-offset:0; border-color:var(--ring);}
::placeholder{color:var(--faint);}
svg{display:block;}

/* ---------- header ---------- */
.top{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
.wordmark{font-family:var(--font-serif); font-size:26px; font-weight:600; letter-spacing:.01em; color:var(--brand); display:flex; align-items:center; gap:9px;}
.wordmark svg{width:22px; height:22px; stroke:var(--brand);}
.top-right{display:flex; align-items:center; gap:10px;}
.streak-chip{
  display:flex; align-items:center; gap:6px;
  font-weight:600; font-size:13.5px; color:var(--brand);
  background:var(--amber-soft); border-radius:99px; padding:5px 12px 5px 9px;
}
.streak-chip svg{width:15px; height:15px; stroke:var(--amber);}
.iconbtn{
  width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  color:var(--sub); border:1px solid var(--border); background:var(--card); transition:background-color .18s ease, color .18s ease;
}
.iconbtn:hover{background:var(--muted); color:var(--ink);}
.iconbtn svg{width:18px; height:18px; stroke:currentColor;}

/* ---------- tabs ---------- */
.tabs{
  display:flex; gap:4px; background:var(--muted); border:1px solid var(--border);
  border-radius:12px; padding:4px; margin-bottom:26px;
}
.tab{
  flex:1; text-align:center; padding:9px 4px; border-radius:9px;
  font-weight:600; font-size:14px; color:var(--sub); transition:background-color .18s ease, color .18s ease;
}
.tab:hover{color:var(--ink);}
.tab[aria-selected="true"]{background:var(--card); color:var(--brand); box-shadow:var(--shadow);}

/* ---------- today ---------- */
.dateline{font-size:13px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin-bottom:6px;}
.xp-block{margin:18px 0 8px;}
.xp-row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px;}
.xp-level{font-family:var(--font-serif); font-size:17px; font-weight:600;}
.xp-detail{font-size:13px; color:var(--sub);}
.xp-bar{height:6px; border-radius:99px; background:var(--muted); border:1px solid var(--border); overflow:hidden;}
.xp-fill{height:100%; background:var(--amber); border-radius:99px; transition:width .5s ease;}
.grace-row{display:flex; align-items:center; gap:7px; margin-top:10px; font-size:13px; color:var(--sub);}
.grace-row svg{width:14px; height:14px;}
.leaf-on{stroke:var(--grace);}
.leaf-off{stroke:var(--faint); opacity:.45;}

.verse-card{
  border-left:3px solid var(--amber); background:var(--muted);
  border-radius:0 12px 12px 0; padding:16px 18px; margin:22px 0 26px;
}
.verse-text{font-family:var(--font-serif); font-style:italic; font-size:16.5px; line-height:1.6;}
.verse-ref{margin-top:8px; font-size:12.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--brand);}

.cards{display:flex; flex-direction:column; gap:12px;}
.card{
  position:relative; display:flex; align-items:center; gap:14px;
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:16px 16px 16px 18px; box-shadow:var(--shadow);
  cursor:pointer; transition:border-color .18s ease, background-color .25s ease;
}
.card:hover{border-color:var(--border-strong);}
.card.done{background:var(--green-soft); border-color:transparent;}
.cat-icon{flex:none; width:38px; height:38px; border-radius:10px; background:var(--muted); display:flex; align-items:center; justify-content:center;}
.cat-icon svg{width:19px; height:19px; stroke:var(--brand);}
.card.done .cat-icon{background:transparent;}
.card.done .cat-icon svg{stroke:var(--green-text);}
.card-body{flex:1; min-width:0;}
.card-cat{font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--brand); display:flex; align-items:center; gap:8px;}
.card.done .card-cat{color:var(--green-text);}
.cat-streak{font-weight:600; letter-spacing:0; text-transform:none; color:var(--faint);}
.card-cue{font-size:13px; color:var(--sub); margin-top:3px;}
.card-action{font-size:15px; font-weight:600; margin-top:2px; line-height:1.4;}
.card-meta{display:flex; gap:12px; margin-top:6px; font-size:12px; color:var(--faint);}
.card.done .card-cue, .card.done .card-action{color:var(--sub);}
.check{
  flex:none; width:44px; height:44px; border-radius:50%;
  border:1.5px solid var(--border-strong); background:var(--card);
  display:flex; align-items:center; justify-content:center;
  transition:background-color .2s ease, border-color .2s ease;
}
.check:hover{border-color:var(--green);}
.check:active{transform:scale(.94);}
.check svg{width:20px; height:20px; stroke:transparent;}
.card.done .check{background:var(--green); border-color:var(--green);}
.card.done .check svg{stroke:#fff;}
.card.done .check svg path{stroke-dasharray:26; stroke-dashoffset:26; animation:draw .4s .05s ease forwards;}
@keyframes draw{to{stroke-dashoffset:0;}}
.xpfloat{
  position:absolute; right:14px; top:6px; font-weight:700; font-size:14px; color:var(--green-text);
  pointer-events:none; animation:floatUp .9s ease forwards;
}
@keyframes floatUp{0%{opacity:0; transform:translateY(6px);} 25%{opacity:1;} 100%{opacity:0; transform:translateY(-22px);}}

.devotional{
  margin-top:26px; padding:20px; border-radius:14px;
  background:var(--amber-soft); border:1px solid transparent;
  animation:fadeIn .6s ease;
}
.devotional-label{display:flex; align-items:center; gap:8px; font-size:11.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--brand); margin-bottom:9px;}
.devotional-label svg{width:15px; height:15px; stroke:var(--brand);}
.devotional-text{font-family:var(--font-serif); font-style:italic; font-size:16px; line-height:1.65;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

.grace-note{
  margin-top:14px; padding:13px 16px; border-radius:12px; font-size:13.5px;
  background:var(--grace-soft); color:var(--grace-text); display:flex; gap:10px; align-items:flex-start;
}
.grace-note svg{flex:none; width:16px; height:16px; stroke:var(--grace); margin-top:2px;}

/* ---------- review / sabbath ---------- */
.sabbath-head{margin:8px 0 22px;}
.sabbath-head h2{font-size:24px; margin-bottom:8px;}
.sabbath-head p{color:var(--sub); font-size:14.5px;}
.stats-row{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:22px;}
.stat{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 12px; text-align:center;}
.stat-num{font-family:var(--font-serif); font-size:22px; font-weight:600; color:var(--brand);}
.stat-label{font-size:11.5px; color:var(--sub); margin-top:3px; letter-spacing:.04em;}
.prompt-block{margin-bottom:18px;}
.prompt-block label{display:block; font-weight:600; font-size:14px; margin-bottom:7px;}
.prompt-hint{font-weight:400; color:var(--faint); font-size:12.5px;}
.saved-flash{font-size:12.5px; color:var(--green-text); opacity:0; transition:opacity .3s ease;}
.saved-flash.show{opacity:1;}

/* ---------- progress ---------- */
.section{margin-bottom:30px;}
.section > h2{font-size:18px; margin-bottom:4px;}
.section-sub{font-size:13px; color:var(--sub); margin-bottom:14px;}
.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:9px;}
.bar-row .cat-mini{flex:none; width:110px; display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:var(--sub);}
.bar-row .cat-mini svg{width:14px; height:14px; stroke:var(--brand); flex:none;}
.bar-track{flex:1; height:10px; background:var(--muted); border:1px solid var(--border); border-radius:99px; overflow:hidden;}
.bar-fill{height:100%; background:var(--green); border-radius:99px;}
.bar-pct{flex:none; width:38px; text-align:right; font-size:12.5px; font-weight:600; color:var(--sub); font-variant-numeric:tabular-nums;}
.strip{display:flex; gap:3px; flex-wrap:wrap;}
.strip .cell{width:14px; height:14px; border-radius:4px; background:var(--muted); border:1px solid var(--border); display:flex; align-items:center; justify-content:center;}
.cell.full{background:var(--green); border-color:var(--green);}
.cell.partial{background:var(--green-soft); border-color:var(--green-soft);}
.cell.grace{background:var(--grace-soft); border-color:var(--grace);}
.cell.sab{background:var(--amber-soft); border-color:var(--amber-soft);}
.cell.blank{opacity:.35;}
.legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:12px; font-size:12px; color:var(--sub);}
.legend span{display:flex; align-items:center; gap:5px;}
.legend .cell{width:11px; height:11px;}
.badges{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.badge{display:flex; gap:11px; align-items:flex-start; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px;}
.badge.locked{opacity:.5;}
.badge svg{flex:none; width:20px; height:20px; stroke:var(--amber); margin-top:1px;}
.badge.locked svg{stroke:var(--faint);}
.badge b{display:block; font-size:13.5px;}
.badge small{font-size:12px; color:var(--sub); line-height:1.4; display:block; margin-top:2px;}
.level-chips{display:flex; flex-wrap:wrap; gap:8px;}
.level-chip{font-size:12.5px; font-weight:600; background:var(--muted); border:1px solid var(--border); color:var(--sub); border-radius:99px; padding:5px 12px;}
.nudge{
  display:flex; gap:10px; align-items:flex-start; background:var(--green-soft);
  border-radius:12px; padding:13px 15px; font-size:13.5px; color:var(--green-text); margin-bottom:9px;
}
.nudge svg{flex:none; width:16px; height:16px; stroke:var(--green-text); margin-top:2px;}
.empty{color:var(--faint); font-size:14px; padding:14px 0;}

/* ---------- settings ---------- */
.field{margin-bottom:14px;}
.field label{display:block; font-size:12.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--sub); margin-bottom:6px;}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}
.ex-editor{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px;}
.ex-editor-head{display:flex; align-items:center; gap:9px; margin-bottom:13px; font-weight:700; font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--brand);}
.ex-editor-head svg{width:16px; height:16px; stroke:var(--brand);}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font-weight:600; font-size:14.5px; border-radius:11px; padding:11px 18px;
  transition:background-color .18s ease, border-color .18s ease; cursor:pointer;
}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--brand); color:var(--on-brand);}
.btn-primary:hover{background:var(--brand-hover);}
.btn-ghost{border:1px solid var(--border-strong); color:var(--ink); background:var(--card);}
.btn-ghost:hover{background:var(--muted);}
.btn-danger{border:1px solid var(--danger); color:var(--danger); background:transparent;}
.btn-danger:hover{background:rgba(220,38,38,.06);}
.btn-row{display:flex; gap:10px; flex-wrap:wrap;}
.switch{position:relative; width:46px; height:26px; flex:none; border-radius:99px; background:var(--border-strong); transition:background-color .2s ease; border:none;}
.switch[aria-checked="true"]{background:var(--brand);}
.switch::after{
  content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%;
  background:#fff; transition:transform .2s ease; box-shadow:0 1px 3px rgba(0,0,0,.25);
}
.switch[aria-checked="true"]::after{transform:translateX(20px);}
.setting-line{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:13px 0; border-bottom:1px solid var(--border);}
.setting-line:last-child{border-bottom:none;}
.setting-line b{font-size:14.5px; font-weight:600; display:block;}
.setting-line small{font-size:12.5px; color:var(--sub); display:block; margin-top:2px; line-height:1.45;}
.setting-line select, .setting-line input[type="number"]{width:130px; flex:none;}

/* ---------- onboarding ---------- */
.onboard{max-width:560px; margin:0 auto; padding:48px 24px 64px; text-align:left;}
.onboard .wordmark{font-size:38px; justify-content:center; margin-bottom:6px;}
.onboard .wordmark svg{width:30px; height:30px;}
.onboard-verse{text-align:center; font-family:var(--font-serif); font-style:italic; font-size:17px; color:var(--sub); max-width:420px; margin:14px auto 34px; line-height:1.65;}
.onboard h2{font-size:17px; margin:28px 0 10px;}
.onboard p{color:var(--sub); font-size:14.5px; margin-bottom:10px;}
.onboard-cats{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:14px;}
.onboard-cat{display:flex; gap:10px; align-items:flex-start; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px;}
.onboard-cat svg{flex:none; width:17px; height:17px; stroke:var(--brand); margin-top:2px;}
.onboard-cat b{font-size:13.5px; display:block;}
.onboard-cat small{font-size:12px; color:var(--sub); display:block; margin-top:1px; line-height:1.4;}
.onboard .btn{width:100%; margin-top:34px; padding:14px;}

/* ---------- toast ---------- */
.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(8px);
  background:var(--ink); color:var(--bg); font-size:14px; font-weight:600;
  padding:11px 20px; border-radius:99px; opacity:0; pointer-events:none;
  transition:opacity .25s ease, transform .25s ease; z-index:50; max-width:90vw; text-align:center;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

hr.sep{border:none; border-top:1px solid var(--border); margin:26px 0;}

@media (max-width:430px){
  #app{padding:16px 14px 64px;}
  .badges{grid-template-columns:1fr;}
  .onboard-cats{grid-template-columns:1fr;}
  .bar-row .cat-mini{width:96px;}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
}

/* ============================================================
   2026 visual refresh — quiet field journal
   ============================================================ */
:root{
  --bg:#F4F1E9;
  --card:#FFFEFA;
  --muted:#EAE6DA;
  --border:#DDD7C8;
  --border-strong:#C9C0AD;
  --ink:#232820;
  --sub:#65695F;
  --faint:#96998F;
  --brand:#526247;
  --brand-hover:#3F4E36;
  --on-brand:#FFFEF8;
  --amber:#B86F3F;
  --amber-soft:#F2E4D6;
  --green:#607B58;
  --green-text:#486141;
  --green-soft:#E3EBDD;
  --grace:#687187;
  --grace-text:#545D73;
  --grace-soft:#E4E7ED;
  --danger:#A4443C;
  --ring:#7D8C70;
  --shadow:0 12px 32px rgba(53,57,45,.055);
}
html.dark{
  --bg:#171A16;
  --card:#20241E;
  --muted:#282D25;
  --border:#343A31;
  --border-strong:#4A5245;
  --ink:#F0EEE5;
  --sub:#B6B9AD;
  --faint:#7F857A;
  --brand:#A9BE99;
  --brand-hover:#BDD0AF;
  --on-brand:#172014;
  --amber:#D49468;
  --amber-soft:#382B22;
  --green:#88A77C;
  --green-text:#A9C89D;
  --green-soft:#263326;
  --grace:#A7AEC0;
  --grace-text:#C1C7D5;
  --grace-soft:#2D3038;
  --danger:#E47D73;
  --ring:#A9BE99;
  --shadow:0 14px 36px rgba(0,0,0,.16);
}
body{
  background:
    radial-gradient(circle at 85% 8%, color-mix(in srgb, var(--amber-soft) 65%, transparent) 0, transparent 28rem),
    var(--bg);
  letter-spacing:-.006em;
}
#app{
  width:min(1180px, 100%);
  max-width:none;
  min-height:100vh;
  margin:0 auto;
  padding:32px;
  display:grid;
  grid-template-columns:208px minmax(0, 1fr);
  grid-template-rows:auto 1fr;
  column-gap:58px;
}
.top{
  grid-column:1;
  grid-row:1;
  display:block;
  margin:0;
  padding-bottom:34px;
}
.wordmark{
  font-size:30px;
  color:var(--ink);
  gap:11px;
}
.wordmark svg{width:25px; height:25px; stroke:var(--brand);}
.top-right{
  margin-top:30px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
}
.streak-chip{
  order:2;
  color:var(--sub);
  background:transparent;
  border:1px solid var(--border);
  padding:7px 11px;
}
.iconbtn{
  width:36px;
  height:36px;
  border-color:var(--border);
  background:transparent;
}
.tabs{
  grid-column:1;
  grid-row:2;
  align-self:start;
  position:sticky;
  top:32px;
  display:flex;
  flex-direction:column;
  gap:5px;
  background:transparent;
  border:0;
  border-radius:0;
  padding:0;
  margin:0;
}
.tab{
  flex:none;
  text-align:left;
  padding:11px 13px;
  border-radius:9px;
  color:var(--sub);
  font-size:13px;
  letter-spacing:.035em;
}
.tab::before{
  content:'';
  display:inline-block;
  width:6px;
  height:6px;
  margin:0 12px 1px 0;
  border:1px solid var(--faint);
  border-radius:50%;
}
.tab[aria-selected="true"]{
  background:var(--card);
  color:var(--ink);
  box-shadow:none;
}
.tab[aria-selected="true"]::before{
  background:var(--brand);
  border-color:var(--brand);
}
main{
  grid-column:2;
  grid-row:1 / span 2;
  min-width:0;
  padding-bottom:60px;
}
.today-head{
  display:flex;
  justify-content:space-between;
  gap:28px;
  align-items:flex-end;
  padding:8px 0 30px;
  border-bottom:1px solid var(--border);
  margin-bottom:28px;
}
.today-head h1{
  margin-top:6px;
  max-width:580px;
  font-size:clamp(34px, 5vw, 58px);
  font-weight:500;
  letter-spacing:-.045em;
  line-height:1.03;
}
.today-head h1 em{
  color:var(--brand);
  font-weight:400;
}
.today-summary{
  flex:none;
  width:116px;
  text-align:right;
}
.today-summary strong{
  display:block;
  font-family:var(--font-serif);
  font-size:30px;
  font-weight:500;
  line-height:1;
  color:var(--brand);
}
.today-summary span{
  display:block;
  margin-top:7px;
  font-size:11px;
  line-height:1.35;
  color:var(--sub);
  text-transform:uppercase;
  letter-spacing:.1em;
}
.dateline{
  color:var(--brand);
  font-size:11px;
  letter-spacing:.14em;
  margin:0;
}
.today-layout{
  display:grid;
  grid-template-columns:minmax(0, 1fr) 280px;
  gap:36px;
  align-items:start;
}
.practice-head{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:13px;
}
.practice-head h2{font-size:18px; font-weight:500;}
.practice-head span{font-size:12px; color:var(--faint);}
.cards{gap:9px;}
.card{
  gap:14px;
  min-height:104px;
  padding:15px 14px 15px 17px;
  border-color:transparent;
  border-radius:11px;
  box-shadow:none;
}
.card:hover{
  border-color:var(--border-strong);
  transform:translateX(2px);
}
.card.done{background:var(--green-soft);}
.cat-icon{
  width:34px;
  height:34px;
  align-self:flex-start;
  margin-top:2px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:50%;
}
.cat-icon svg{width:16px; height:16px;}
.card-cat{font-size:10px; color:var(--brand);}
.card-cue{
  margin-top:5px;
  font-family:var(--font-serif);
  font-size:14px;
  color:var(--sub);
}
.card-action{
  margin-top:0;
  font-size:15px;
  font-weight:600;
}
.card-meta{margin-top:7px; font-size:10.5px; letter-spacing:.03em;}
.check{
  width:40px;
  height:40px;
  border-radius:10px;
  box-shadow:inset 0 0 0 3px var(--card);
}
.card.done .check{box-shadow:inset 0 0 0 3px var(--green-soft);}
.today-aside{
  position:sticky;
  top:32px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.formation-card,
.verse-card{
  margin:0;
  padding:20px;
  background:color-mix(in srgb, var(--card) 88%, transparent);
  border:1px solid var(--border);
  border-radius:12px;
  box-shadow:var(--shadow);
}
.formation-label{
  font-size:10px;
  font-weight:700;
  color:var(--faint);
  text-transform:uppercase;
  letter-spacing:.13em;
}
.xp-block{margin:12px 0 0;}
.xp-row{display:block; margin-bottom:10px;}
.xp-level{display:block; font-size:24px; font-weight:500;}
.xp-detail{display:block; margin-top:2px; font-size:11px;}
.xp-bar{height:5px; border:0;}
.grace-row{
  flex-wrap:wrap;
  gap:5px;
  margin-top:14px;
  font-size:11px;
  line-height:1.4;
}
.grace-row span:last-child{flex-basis:100%; margin-top:2px;}
.verse-card{
  border-left:1px solid var(--border);
  background:var(--amber-soft);
}
.verse-card::before{
  content:'“';
  display:block;
  height:28px;
  font-family:var(--font-serif);
  font-size:42px;
  line-height:1;
  color:var(--amber);
}
.verse-text{font-size:15px; line-height:1.65;}
.verse-ref{font-size:10px;}
.grace-note{grid-column:1 / -1; margin:0 0 22px;}
.devotional{border-radius:12px;}
.section > h2{font-size:22px; font-weight:500;}
.stats-row,.stat,.badge,.ex-editor{border-radius:10px;}
.stat,.badge,.ex-editor{box-shadow:none;}
.onboard{
  grid-column:1 / -1;
  max-width:720px;
  padding:64px 24px;
}
.onboard .wordmark{font-size:48px;}
.onboard-verse{font-size:20px; max-width:580px;}
.onboard-cats{gap:12px;}
.onboard-cat{border-radius:10px; padding:15px;}

@media (max-width:860px){
  #app{
    display:block;
    width:min(680px, 100%);
    padding:22px 20px 76px;
  }
  .top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0;
    margin-bottom:18px;
  }
  .wordmark{font-size:27px;}
  .top-right{margin:0;}
  .tabs{
    position:static;
    flex-direction:row;
    gap:4px;
    padding:4px;
    margin-bottom:28px;
    background:var(--muted);
    border:1px solid var(--border);
    border-radius:12px;
  }
  .tab{text-align:center; flex:1; padding:9px 4px;}
  .tab::before{display:none;}
  .tab[aria-selected="true"]{box-shadow:var(--shadow);}
  main{padding:0;}
  .today-head{padding-top:2px;}
  .today-layout{grid-template-columns:1fr;}
  .today-aside{
    position:static;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-row:1;
  }
  .practice{grid-row:2;}
  .grace-note{grid-row:auto;}
}
@media (max-width:560px){
  body{background:var(--bg);}
  #app{padding:16px 14px 64px;}
  .top-right{gap:4px;}
  .streak-chip{border:0; padding:6px;}
  .today-head{align-items:flex-start; margin-bottom:20px;}
  .today-head h1{font-size:37px;}
  .today-summary{width:70px;}
  .today-summary strong{font-size:25px;}
  .today-layout{gap:18px;}
  .today-aside{display:block;}
  .formation-card{margin-bottom:10px;}
  .verse-card{margin-bottom:2px;}
  .card{min-height:0; padding:14px 12px; gap:10px;}
  .cat-icon{display:none;}
  .card-meta span:last-child{display:none;}
  .check{width:38px; height:38px;}
  .onboard{padding:38px 8px 54px;}
  .onboard .wordmark{font-size:40px;}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';
/* ============================================================
   Abide — Daily Discipline Builder
   Single-file, vanilla JS, localStorage only. John 15:4.
   ============================================================ */

const KEY = 'abide_app_state';
const CATS = ['Spirit','Body','Mind','Money','Relationships','Craft'];
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/* ---------- icons (inline SVG, Lucide-style strokes) ---------- */
const I = (paths, vb) => `<svg viewBox="${vb||'0 0 24 24'}" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths}</svg>`;
const ICONS = {
  vine: I(`<path d="M12 21V9"/><path d="M12 13c0-3.3-2.7-6-6-6 0 3.3 2.7 6 6 6z"/><path d="M12 9c0-3.3 2.7-6 6-6 0 3.3-2.7 6-6 6z"/>`),
  Spirit: I(`<path d="M12 21V9"/><path d="M12 13c0-3.3-2.7-6-6-6 0 3.3 2.7 6 6 6z"/><path d="M12 9c0-3.3 2.7-6 6-6 0 3.3-2.7 6-6 6z"/>`),
  Body: I(`<path d="M6.5 6.5v11"/><path d="M17.5 6.5v11"/><path d="M6.5 12h11"/><path d="M3.5 9v6"/><path d="M20.5 9v6"/>`),
  Mind: I(`<path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 0-4 10.5c.7.6 1 1.5 1 2.5h6c0-1 .3-1.9 1-2.5A6 6 0 0 0 12 3z"/>`),
  Money: I(`<rect x="3" y="7" width="18" height="11" rx="2"/><circle cx="12" cy="12.5" r="2.6"/><path d="M6.5 10.5v.01"/><path d="M17.5 14.5v.01"/>`),
  Relationships: I(`<path d="M12 20.5 4.7 13a4.6 4.6 0 0 1 6.5-6.5l.8.8.8-.8A4.6 4.6 0 0 1 19.3 13z"/>`),
  Craft: I(`<path d="M15.5 4.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4z"/><path d="M13.5 6.5l3 3"/>`),
  flame: I(`<path d="M12 21c3.9 0 6.5-2.5 6.5-6 0-3-1.8-4.6-3-6.5-.6 1.4-1.3 2-2.3 2.6C13.7 8.6 13 5.7 10 3c.3 3-1 4.5-2.3 6C6.3 10.6 5.5 12.3 5.5 15c0 3.5 2.6 6 6.5 6z"/>`),
  leaf: I(`<path d="M11 20A7 7 0 0 1 4 13c0-4 3-8 9-9.5 3.5-.9 6.5-.5 7.5-.5-.2 1-.7 4-1.5 6.5C17.5 15 15 20 11 20z"/><path d="M4 21c4-6 8-9.5 13-12"/>`),
  check: I(`<path d="M5 12.5l4.5 4.5L19 7.5"/>`, '0 0 24 24'),
  sun: I(`<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="m17.7 17.7 1.4 1.4"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.3 17.7-1.4 1.4"/><path d="m19.1 4.9-1.4 1.4"/>`),
  moon: I(`<path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5a8.5 8.5 0 1 0 11 11z"/>`),
  award: I(`<circle cx="12" cy="9" r="5.5"/><path d="M8.8 13.8 7.5 21l4.5-2.6L16.5 21l-1.3-7.2"/>`),
  sprout: I(`<path d="M7 20h10"/><path d="M12 20v-8"/><path d="M12 12c0-3-2.5-5.5-5.5-5.5C6.5 9.5 9 12 12 12z"/><path d="M12 10c0-3.5 2.5-6 5.5-6 0 3.5-2.5 6-5.5 6z"/>`),
  book: I(`<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5z"/><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20v-2.5"/>`),
};

/* ---------- seed data (defaults only — everything editable in Settings) ---------- */
function seedExercises(){
  return [
    { id:'spirit_01', category:'Spirit', cue:'After I silence my morning alarm', action:'Read one verse from today’s reading plan and pray one sentence', duration_seconds:90, xp:10, verse_ref:'John 15:5' },
    { id:'body_01', category:'Body', cue:'After I brush my teeth in the morning', action:'Do 10 pushups or 20 squats', duration_seconds:60, xp:10, verse_ref:'1 Corinthians 6:19-20' },
    { id:'mind_01', category:'Mind', cue:'After I sit down at my work desk', action:'Write today’s #1 priority on paper — one sentence', duration_seconds:60, xp:10, verse_ref:'Romans 12:2' },
    { id:'money_01', category:'Money', cue:'After I open my banking app', action:'Log any spending from the last 24 hours in one line', duration_seconds:60, xp:10, verse_ref:'Proverbs 3:9-10' },
    { id:'rel_01', category:'Relationships', cue:'Before I get into bed', action:'Send one message of appreciation or check-in to my wife or a friend', duration_seconds:90, xp:10, verse_ref:'1 Corinthians 13:4-7' },
    { id:'craft_01', category:'Craft', cue:'After I finish lunch', action:'10 minutes of Spanish practice or one T24/Snowflake learning note', duration_seconds:600, xp:10, verse_ref:'Colossians 3:23' },
  ];
}
function seedVerses(){
  return [
    { ref:'John 15:5', text:'I am the vine; you are the branches. Whoever abides in me and I in him, he it is that bears much fruit, for apart from me you can do nothing.' },
    { ref:'Galatians 5:22-23', text:'The fruit of the Spirit is love, joy, peace, patience, kindness, goodness, faithfulness, gentleness, self-control.' },
    { ref:'1 Corinthians 9:25', text:'Every athlete exercises self-control in all things. They do it to receive a perishable wreath, but we an imperishable.' },
    { ref:'Hebrews 12:1-2', text:'Let us run with endurance the race that is set before us, looking to Jesus, the founder and perfecter of our faith.' },
    { ref:'Philippians 4:13', text:'I can do all things through him who strengthens me.' },
    { ref:'Proverbs 16:3', text:'Commit your work to the Lord, and your plans will be established.' },
    { ref:'Lamentations 3:22-23', text:'The steadfast love of the Lord never ceases; his mercies never come to an end; they are new every morning; great is your faithfulness.' },
  ];
}
function seedState(){
  return {
    version: 1,
    createdAt: todayStr(),
    lastProcessed: todayStr(),
    onboarded: false,
    dark: false,
    sabbathDay: 0,
    graceAllowance: 2,
    xp: 0,
    exercises: seedExercises(),
    verses: seedVerses(),
    log: {},          // 'YYYY-MM-DD' -> { done:{exId:true}, xp:number }
    graceDays: [],    // dates covered by grace
    badges: {},       // badgeKey -> date earned
    reviews: {},      // 'YYYY-MM-DD' -> [p1, p2, p3]
  };
}

/* ---------- state / persistence ---------- */
let state = load();
let view = 'today';
let renderedDay = null;

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return seedState();
    const parsed = JSON.parse(raw);
    // merge onto seed so new fields appear after upgrades
    const s = Object.assign(seedState(), parsed);
    if(!Array.isArray(s.exercises) || s.exercises.length === 0) s.exercises = seedExercises();
    if(!Array.isArray(s.verses) || s.verses.length === 0) s.verses = seedVerses();
    if(typeof s.log !== 'object' || s.log === null) s.log = {};
    return s;
  }catch(e){
    try{ localStorage.setItem(KEY + '_corrupt', localStorage.getItem(KEY) || ''); }catch(_){}
    console.warn('Abide: stored state was unreadable; starting fresh. Old data kept under ' + KEY + '_corrupt');
    return seedState();
  }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }
  catch(e){ toast('Could not save — storage unavailable'); }
}

/* ---------- local-date helpers (device-local, never UTC) ---------- */
function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function toDate(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function addDays(s, n){
  const d = toDate(s); d.setDate(d.getDate()+n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dayOfWeek(s){ return toDate(s).getDay(); }
function daysBetween(a, b){ return Math.round((toDate(b) - toDate(a)) / 864e5); }
function fmtDate(s){
  return toDate(s).toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });
}
function fmtShort(s){
  return toDate(s).toLocaleDateString(undefined, { month:'short', day:'numeric' });
}

/* ---------- day facts ---------- */
function isSabbath(d){ return dayOfWeek(d) === state.sabbathDay; }
function dayLog(d){ return state.log[d] || { done:{}, xp:0 }; }
function doneCount(d){ return Object.keys(dayLog(d).done).length; }
function catDone(d, exId){ return !!dayLog(d).done[exId]; }
function fullyDone(d){
  const done = dayLog(d).done;
  return state.exercises.every(ex => done[ex.id]);
}
function isGrace(d){ return state.graceDays.indexOf(d) !== -1; }

/* ---------- grace (Lamentations 3:22-23) ----------
   On each new day, missed days since last open are covered by grace
   when (a) the chain was alive the day before, and (b) fewer than
   `graceAllowance` grace days sit in that day's trailing 30-day window. */
function graceUsedInWindow(endDay){
  const start = addDays(endDay, -29);
  return state.graceDays.filter(g => g >= start && g <= endDay).length;
}
function graceRemaining(){
  return Math.max(0, state.graceAllowance - graceUsedInWindow(todayStr()));
}
function processRollover(){
  const today = todayStr();
  if(state.lastProcessed >= today) return false;
  let d = addDays(state.lastProcessed, 0);
  // judge every completed day from lastProcessed through yesterday
  while(d < today){
    if(!isSabbath(d) && !fullyDone(d) && !isGrace(d) && d >= state.createdAt){
      const prev = addDays(d, -1);
      const chainAlive = prev >= state.createdAt &&
        (doneCount(prev) > 0 || isSabbath(prev) || isGrace(prev));
      if(chainAlive && graceUsedInWindow(d) < state.graceAllowance){
        state.graceDays.push(d);
      }
    }
    d = addDays(d, 1);
  }
  state.lastProcessed = today;
  checkBadges();
  save();
  return true;
}

/* ---------- streaks (never below the mercy line) ---------- */
function dayKept(d, exId){
  if(isSabbath(d) || isGrace(d)) return 'bridge';
  const ok = exId ? catDone(d, exId) : fullyDone(d);
  return ok ? 'kept' : 'broken';
}
function streak(exId){
  const today = todayStr();
  let count = 0;
  let d = (dayKept(today, exId) === 'kept') ? today : addDays(today, -1);
  while(d >= state.createdAt){
    const k = dayKept(d, exId);
    if(k === 'broken') break;
    if(k === 'kept') count++;
    // sabbath/grace bridge: continue without counting
    d = addDays(d, -1);
  }
  return count;
}

/* ---------- XP & levels ----------
   Thresholds: 0, 300, 700, 1200, 1800, ... (level-up ~weekly at full completion) */
function levelThreshold(n){
  let t = 0;
  for(let i = 2; i <= n; i++) t += 200 + 100*(i-1);
  return t;
}
function levelForXp(xp){
  let n = 1;
  while(levelThreshold(n+1) <= xp) n++;
  return { level:n, floor:levelThreshold(n), next:levelThreshold(n+1) };
}

/* ---------- verse of the week ---------- */
function weekVerse(){
  const epoch = new Date(2026, 0, 4); // a Sunday; stable rotation anchor
  const now = toDate(todayStr());
  const weeks = Math.floor(Math.round((now - epoch)/864e5) / 7);
  const list = state.verses.length ? state.verses : seedVerses();
  return list[((weeks % list.length) + list.length) % list.length];
}

/* ---------- devotional line (unlocked by a full day, tied to what was done) ---------- */
const ACT_PHRASES = {
  Spirit:'opened the Word', Body:'moved your body', Mind:'named what matters most',
  Money:'faced your money honestly', Relationships:'reached toward someone you love', Craft:'practiced your craft',
};
const DEVOTIONALS = [
  (a,b)=>`Today you ${a} and ${b}. Small things, faithfully done — this is what abiding looks like on an ordinary day. (John 15:5)`,
  (a,b)=>`You ${a}, you ${b} — six small branches on one Vine. None of it earned His love; all of it grew out of it. (John 15:4)`,
  (a,b)=>`A day where you ${a} and ${b} is not a small day. Whoever is faithful in very little is faithful in much. (Luke 16:10)`,
  (a,b)=>`You ${a} and you ${b} — not to be loved, but because you already are. Discipline is fruit, not payment. (Galatians 5:22-23)`,
  (a,b)=>`Today you ${a}, ${b}, and tended every branch. And His mercies will still be new tomorrow. (Lamentations 3:22-23)`,
  (a,b)=>`Every small rep counted today — you ${a} and ${b}. Run with endurance; He finishes what He starts. (Hebrews 12:1-2)`,
];
function devotionalFor(d){
  let h = 0;
  for(const c of d) h = (h*31 + c.charCodeAt(0)) >>> 0;
  const done = state.exercises.filter(ex => catDone(d, ex.id)).map(ex => ex.category);
  const cats = done.length ? done : CATS;
  const a = ACT_PHRASES[cats[h % cats.length]];
  let b = ACT_PHRASES[cats[(h + 3) % cats.length]];
  if(b === a) b = ACT_PHRASES[cats[(h + 1) % cats.length]] || a;
  return DEVOTIONALS[h % DEVOTIONALS.length](a, b === a ? 'kept every branch tended' : b);
}

/* ---------- badges (light touch) ---------- */
const BADGES = [
  { key:'full_six', name:'Full Six', desc:'All six categories completed in a single day.' },
  { key:'abider_7', name:'7-Day Abider', desc:'A full-day streak of seven.' },
  { key:'grace_received', name:'Grace Received', desc:'Used a grace day, then showed up fully the next.' },
  { key:'month_vine', name:'One Month in the Vine', desc:'A full-day streak of thirty.' },
];
function checkBadges(){
  const today = todayStr();
  const earn = k => { if(!state.badges[k]) state.badges[k] = today; };
  if(fullyDone(today) || Object.keys(state.log).some(d => fullyDone(d))) earn('full_six');
  const s = streak(null);
  if(s >= 7) earn('abider_7');
  if(s >= 30) earn('month_vine');
  if(state.graceDays.some(g => fullyDone(addDays(g, 1)))) earn('grace_received');
}

/* ---------- phase-2 nudges (progressive overload, gated on 80% over 10 days) ---------- */
function readyToGrow(){
  const today = todayStr();
  if(daysBetween(state.createdAt, today) < 10) return [];
  const out = [];
  for(const ex of state.exercises){
    let days = 0, hits = 0, d = addDays(today, -1);
    while(days < 10 && d >= state.createdAt){
      if(!isSabbath(d)){ days++; if(catDone(d, ex.id)) hits++; }
      d = addDays(d, -1);
    }
    if(days === 10 && hits >= 8) out.push(ex);
  }
  return out;
}

/* ---------- tiny helpers ---------- */
const $ = sel => document.querySelector(sel);
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
let toastTimer = null;
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}
function fmtDuration(sec){
  if(sec >= 120) return Math.round(sec/60) + ' min';
  if(sec >= 60) return '1 min';
  return sec + ' sec';
}
function applyTheme(){
  document.documentElement.classList.toggle('dark', !!state.dark);
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  applyTheme();
  renderedDay = todayStr();
  const app = $('#app');
  if(!state.onboarded){ app.innerHTML = renderOnboarding(); return; }
  const sabbathToday = isSabbath(todayStr());
  const todayLabel = sabbathToday ? 'Sabbath' : 'Today';
  app.innerHTML = `
    ${renderHeader()}
    <nav class="tabs" role="tablist" aria-label="Screens">
      <button class="tab" role="tab" aria-selected="${view==='today'}" data-nav="today">${todayLabel}</button>
      <button class="tab" role="tab" aria-selected="${view==='progress'}" data-nav="progress">Progress</button>
      <button class="tab" role="tab" aria-selected="${view==='settings'}" data-nav="settings">Settings</button>
    </nav>
    <main>
      ${view==='today' ? (sabbathToday ? renderReview() : renderToday())
        : view==='progress' ? renderProgress()
        : renderSettings()}
    </main>`;
}

function renderHeader(){
  const s = streak(null);
  return `
  <header class="top">
    <div class="wordmark">${ICONS.vine}<span>Abide</span></div>
    <div class="top-right">
      <span class="streak-chip" title="Full-day streak">${ICONS.flame}<span>${s} day${s===1?'':'s'}</span></span>
      <button class="iconbtn" data-act="theme" aria-label="Switch to ${state.dark?'light':'dark'} mode">${state.dark?ICONS.sun:ICONS.moon}</button>
    </div>
  </header>`;
}

/* ---------- Today ---------- */
function renderToday(){
  const today = todayStr();
  const v = weekVerse();
  const lv = levelForXp(state.xp);
  const completed = doneCount(today);
  const pct = Math.min(100, Math.round((state.xp - lv.floor) / (lv.next - lv.floor) * 100));
  const remaining = graceRemaining();
  const graceIcons = Array.from({length: state.graceAllowance}, (_,i) =>
    `<span class="${i < remaining ? 'leaf-on' : 'leaf-off'}">${ICONS.leaf}</span>`).join('');
  const yesterday = addDays(today, -1);
  const graceNote = isGrace(yesterday) ? `
    <div class="grace-note">${ICONS.leaf}
      <span>Yesterday was covered by grace — mercies are new every morning. This is not a failure; it’s grace used well. Your streak stands.</span>
    </div>` : '';
  const cards = state.exercises.map(ex => {
    const done = catDone(today, ex.id);
    const cs = streak(ex.id);
    return `
    <div class="card ${done?'done':''}" data-card="${ex.id}">
      <div class="cat-icon">${ICONS[ex.category] || ICONS.sprout}</div>
      <div class="card-body">
        <div class="card-cat">${esc(ex.category)}${cs >= 2 ? `<span class="cat-streak">×${cs}</span>` : ''}</div>
        <div class="card-cue">${esc(ex.cue)},</div>
        <div class="card-action">then: ${esc(ex.action)}</div>
        <div class="card-meta"><span>~${fmtDuration(ex.duration_seconds)}</span><span>+${ex.xp} XP</span><span>${esc(ex.verse_ref)}</span></div>
      </div>
      <button class="check" data-check="${ex.id}" role="checkbox" aria-checked="${done}" aria-label="Mark ${esc(ex.category)} done">${ICONS.check}</button>
    </div>`;
  }).join('');
  const devotional = fullyDone(today) ? `
    <div class="devotional">
      <div class="devotional-label">${ICONS.sprout}<span>Today’s reflection</span></div>
      <div class="devotional-text">${esc(devotionalFor(today))}</div>
    </div>` : '';
  return `
    <section class="today-head">
      <div>
        <div class="dateline">${fmtDate(today)}</div>
        <h1>Tend what is <em>yours</em> today.</h1>
      </div>
      <div class="today-summary" aria-label="${completed} of 6 practices complete">
        <strong>${completed}/6</strong>
        <span>branches tended</span>
      </div>
    </section>
    ${graceNote}
    <div class="today-layout">
      <section class="practice">
        <div class="practice-head">
          <h2>Today’s practice</h2>
          <span>Small, faithful, enough.</span>
        </div>
        <div class="cards">${cards}</div>
        ${devotional}
      </section>
      <aside class="today-aside" aria-label="Formation and weekly verse">
        <div class="formation-card">
          <div class="formation-label">Your formation</div>
          <div class="xp-block">
            <div class="xp-row">
              <span class="xp-level">Level ${lv.level}</span>
              <span class="xp-detail">${state.xp} XP · ${lv.next - state.xp} to Level ${lv.level+1}</span>
            </div>
            <div class="xp-bar"><div class="xp-fill" style="width:${pct}%"></div></div>
            <div class="grace-row">${graceIcons}<span>${remaining} grace day${remaining===1?'':'s'} available this month</span></div>
          </div>
        </div>
        <div class="verse-card">
          <div class="verse-text">${esc(v.text)}</div>
          <div class="verse-ref">${esc(v.ref)} · this week</div>
        </div>
      </aside>
    </div>`;
}

/* ---------- Review Mode (weekly Sabbath, §5.3) ---------- */
function renderReview(){
  const today = todayStr();
  // week = the 7 days ending today
  let weekXp = 0, fullDays = 0, activeDays = 0;
  const catHits = {}; CATS.forEach(c => catHits[c] = 0);
  for(let i = 6; i >= 0; i--){
    const d = addDays(today, -i);
    if(d < state.createdAt) continue;
    weekXp += dayLog(d).xp || 0;
    if(fullyDone(d)) fullDays++;
    if(!isSabbath(d)) activeDays++;
    for(const ex of state.exercises){ if(catDone(d, ex.id)) catHits[ex.category]++; }
  }
  const denom = Math.max(1, activeDays);
  const bars = state.exercises.map(ex => {
    const p = Math.min(100, Math.round(catHits[ex.category] / denom * 100));
    return `
    <div class="bar-row">
      <span class="cat-mini">${ICONS[ex.category]}<span>${esc(ex.category)}</span></span>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%"></div></div>
      <span class="bar-pct">${p}%</span>
    </div>`;
  }).join('');
  const r = state.reviews[today] || ['','',''];
  const prompts = [
    ['Spirit · Body · Mind', 'Where did you see quiet growth this week?'],
    ['Money · Relationships · Craft', 'What did faithfulness look like in the outward things?'],
    ['Looking ahead', 'What is one thing to carry into next week?'],
  ];
  return `
    <div class="dateline">${fmtDate(today)}</div>
    <div class="sabbath-head">
      <h2>Sabbath — rest &amp; review</h2>
      <p>No exercises today. Rest is part of the discipline, not a gap in it. “Come to me, all who labor and are heavy laden, and I will give you rest.” (Matthew 11:28)</p>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">${weekXp}</div><div class="stat-label">XP this week</div></div>
      <div class="stat"><div class="stat-num">${fullDays}</div><div class="stat-label">full days</div></div>
      <div class="stat"><div class="stat-num">${streak(null)}</div><div class="stat-label">day streak</div></div>
    </div>
    <div class="section">
      <h2>This week, by category</h2>
      <div class="section-sub">Completion across the last seven days.</div>
      ${bars}
    </div>
    <div class="section">
      <h2>What did abiding look like this week?</h2>
      <div class="section-sub">Three short answers are enough. They save as you type. <span class="saved-flash" id="reviewSaved">Saved</span></div>
      ${prompts.map((p,i)=>`
      <div class="prompt-block">
        <label for="rev${i}">${p[0]} <span class="prompt-hint">— ${p[1]}</span></label>
        <textarea id="rev${i}" data-review="${i}" placeholder="A sentence or two…">${esc(r[i]||'')}</textarea>
      </div>`).join('')}
    </div>`;
}

/* ---------- Progress ---------- */
function renderProgress(){
  const today = todayStr();
  const daysTracked = daysBetween(state.createdAt, today) + 1;
  if(daysTracked < 2 && doneCount(today) === 0){
    return `
    <div class="section"><h2>Progress</h2>
      <div class="empty">Your first days will gather here. Complete today’s exercises, then come back tomorrow — small reps, plotted quietly.</div>
    </div>
    ${renderBadges()}`;
  }
  // per-category completion over last 30 days (non-sabbath days only)
  const catHits = {}; let activeDays = 0;
  CATS.forEach(c => catHits[c] = 0);
  for(let i = 29; i >= 0; i--){
    const d = addDays(today, -i);
    if(d < state.createdAt || isSabbath(d)) continue;
    activeDays++;
    for(const ex of state.exercises){ if(catDone(d, ex.id)) catHits[ex.category]++; }
  }
  const denom = Math.max(1, activeDays);
  const bars = state.exercises.map(ex => {
    const p = Math.round(catHits[ex.category] / denom * 100);
    return `
    <div class="bar-row">
      <span class="cat-mini">${ICONS[ex.category]}<span>${esc(ex.category)}</span></span>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%"></div></div>
      <span class="bar-pct">${p}%</span>
    </div>`;
  }).join('');
  // 30-day full-day strip
  const cells = [];
  for(let i = 29; i >= 0; i--){
    const d = addDays(today, -i);
    let cls = '', title = fmtShort(d) + ' — ';
    if(d < state.createdAt){ cls = 'blank'; title += 'before Abide'; }
    else if(fullyDone(d)){ cls = 'full'; title += 'full day'; }
    else if(isGrace(d)){ cls = 'grace'; title += 'grace day'; }
    else if(isSabbath(d)){ cls = 'sab'; title += 'sabbath'; }
    else if(doneCount(d) > 0){ cls = 'partial'; title += doneCount(d) + ' of ' + state.exercises.length; }
    else if(d === today){ cls = ''; title += 'today, in progress'; }
    else { title += 'missed'; }
    cells.push(`<span class="cell ${cls}" title="${title}"></span>`);
  }
  // level history derived from per-day xp
  const chips = [];
  {
    let cum = 0, level = 1;
    const dates = Object.keys(state.log).sort();
    for(const d of dates){
      cum += dayLog(d).xp || 0;
      while(levelThreshold(level+1) <= cum){ level++; chips.push(`<span class="level-chip">Level ${level} · ${fmtShort(d)}</span>`); }
    }
  }
  const grow = readyToGrow().map(ex => `
    <div class="nudge">${ICONS.sprout}
      <span><b>${esc(ex.category)}</b> has been steady for 10 days (80%+). If it feels automatic now, consider a small increase in Settings — grow the rep, not the burden.</span>
    </div>`).join('');
  return `
    <div class="section">
      <h2>Last 30 days, by category</h2>
      <div class="section-sub">Completion rate across non-sabbath days.</div>
      ${bars}
    </div>
    <div class="section">
      <h2>Full days</h2>
      <div class="section-sub">One square per day, oldest on the left.</div>
      <div class="strip">${cells.join('')}</div>
      <div class="legend">
        <span><span class="cell full"></span> all six</span>
        <span><span class="cell partial"></span> some</span>
        <span><span class="cell grace"></span> grace</span>
        <span><span class="cell sab"></span> sabbath</span>
        <span><span class="cell"></span> missed</span>
      </div>
    </div>
    ${grow ? `<div class="section"><h2>Ready to grow</h2><div class="section-sub">Progressive overload, only once it’s automatic.</div>${grow}</div>` : ''}
    <div class="section">
      <h2>Level history</h2>
      ${chips.length ? `<div class="level-chips">${chips.join('')}</div>` : `<div class="empty">Level-ups will be marked here — the first lands around one week of full days.</div>`}
    </div>
    ${renderBadges()}`;
}
function renderBadges(){
  return `
  <div class="section">
    <h2>Badges</h2>
    <div class="section-sub">Formation milestones — a support, not the point.</div>
    <div class="badges">
      ${BADGES.map(b => {
        const got = state.badges[b.key];
        return `<div class="badge ${got?'':'locked'}">${ICONS.award}<div><b>${b.name}</b><small>${b.desc}${got ? ' · ' + fmtShort(got) : ''}</small></div></div>`;
      }).join('')}
    </div>
  </div>`;
}

/* ---------- Settings ---------- */
function renderSettings(){
  const exEditors = state.exercises.map((ex,i) => `
    <div class="ex-editor">
      <div class="ex-editor-head">${ICONS[ex.category]}<span>${esc(ex.category)}</span></div>
      <div class="field"><label for="cue${i}">Cue (after I…)</label>
        <input id="cue${i}" data-ex="${i}" data-f="cue" value="${esc(ex.cue)}"></div>
      <div class="field"><label for="act${i}">Action (then I…)</label>
        <input id="act${i}" data-ex="${i}" data-f="action" value="${esc(ex.action)}"></div>
      <div class="field-row">
        <div class="field"><label for="dur${i}">Duration (seconds)</label>
          <input id="dur${i}" data-ex="${i}" data-f="duration_seconds" type="number" min="10" step="10" value="${ex.duration_seconds}"></div>
        <div class="field"><label for="xp${i}">XP</label>
          <input id="xp${i}" data-ex="${i}" data-f="xp" type="number" min="1" step="1" value="${ex.xp}"></div>
        <div class="field"><label for="vr${i}">Verse</label>
          <input id="vr${i}" data-ex="${i}" data-f="verse_ref" value="${esc(ex.verse_ref)}"></div>
      </div>
    </div>`).join('');
  const verseLines = state.verses.map(v => v.ref + ' | ' + v.text).join('\n');
  return `
    <div class="section">
      <h2>Rhythm</h2>
      <div class="setting-line">
        <span><b>Dark mode</b><small>For evenings. Light returns on reset.</small></span>
        <button class="switch" role="switch" aria-checked="${!!state.dark}" data-act="theme" aria-label="Dark mode"></button>
      </div>
      <div class="setting-line">
        <span><b>Sabbath day</b><small>One rest-and-review day each week — no exercises.</small></span>
        <select data-set="sabbathDay" aria-label="Sabbath day">
          ${DAY_NAMES.map((n,i)=>`<option value="${i}" ${i===state.sabbathDay?'selected':''}>${n}</option>`).join('')}
        </select>
      </div>
      <div class="setting-line">
        <span><b>Grace days</b><small>Missed days covered per rolling 30 days. Mercy is a feature.</small></span>
        <input type="number" min="0" max="7" step="1" value="${state.graceAllowance}" data-set="graceAllowance" aria-label="Grace days per 30 days">
      </div>
    </div>
    <hr class="sep">
    <div class="section">
      <h2>Exercises</h2>
      <div class="section-sub">Each one is an if-then intention: cue, then a tiny action — under two minutes. Edits save as you type.
        <span class="saved-flash" id="exSaved">Saved</span></div>
      ${exEditors}
    </div>
    <hr class="sep">
    <div class="section">
      <h2>Verse rotation</h2>
      <div class="section-sub">One per line, as <em>Reference | text</em>. The home verse rotates weekly.</div>
      <textarea id="verseBox" rows="8" aria-label="Verse rotation">${esc(verseLines)}</textarea>
      <div class="btn-row" style="margin-top:10px">
        <button class="btn btn-ghost" data-act="saveVerses">Save verses</button>
      </div>
    </div>
    <hr class="sep">
    <div class="section">
      <h2>Data</h2>
      <div class="section-sub">Everything lives in this browser’s localStorage — export a backup to move between devices.</div>
      <div class="btn-row">
        <button class="btn btn-primary" data-act="export">Export backup</button>
        <button class="btn btn-ghost" data-act="import">Import backup</button>
        <input type="file" id="importFile" accept="application/json,.json" style="display:none">
      </div>
      <div class="btn-row" style="margin-top:22px">
        <button class="btn btn-danger" data-act="reset">Start over (erase all data)</button>
      </div>
    </div>`;
}

/* ---------- Onboarding ---------- */
function renderOnboarding(){
  const catDescs = {
    Spirit:'One verse, one sentence of prayer.', Body:'A tiny set of pushups or squats.',
    Mind:'Name today’s one priority.', Money:'Log yesterday’s spending in a line.',
    Relationships:'One message of appreciation.', Craft:'Ten minutes of deliberate practice.',
  };
  return `
  <div class="onboard">
    <div class="wordmark">${ICONS.vine}<span>Abide</span></div>
    <p class="onboard-verse">“Abide in me, and I in you. As the branch cannot bear fruit by itself, unless it abides in the vine, neither can you, unless you abide in me.” — John 15:4</p>
    <h2>Why this app exists</h2>
    <p>Strong starts, weak follow-through — the fix isn’t more willpower, it’s better design. Tiny actions, anchored to routines you already have, done daily. Discipline is the fruit of abiding in Christ, not a project run alongside faith.</p>
    <p>This app is the actual deliverable for the rest of 2026: build the follow-through muscle first, with six two-minute reps a day, before any bigger build begins.</p>
    <h2>Six domains, one tiny action each</h2>
    <div class="onboard-cats">
      ${CATS.map(c => `<div class="onboard-cat">${ICONS[c]}<div><b>${c}</b><small>${catDescs[c]}</small></div></div>`).join('')}
    </div>
    <h2>Grace, built in</h2>
    <p>Missed days happen. Two grace days per month cover them without breaking your streak, and total progress is never erased — mercies are new every morning (Lamentations 3:22-23). One day a week is Sabbath: rest and a short review, no tasks.</p>
    <button class="btn btn-primary" data-act="begin">Begin — abide daily</button>
  </div>`;
}

/* ============================================================
   EVENTS
   ============================================================ */
function toggleExercise(exId){
  const today = todayStr();
  if(isSabbath(today)) return;
  const ex = state.exercises.find(e => e.id === exId);
  if(!ex) return;
  if(!state.log[today]) state.log[today] = { done:{}, xp:0 };
  const day = state.log[today];
  const before = levelForXp(state.xp).level;
  if(day.done[exId]){
    delete day.done[exId];
    day.xp = Math.max(0, (day.xp||0) - ex.xp);
    state.xp = Math.max(0, state.xp - ex.xp);
  } else {
    day.done[exId] = true;
    day.xp = (day.xp||0) + ex.xp;
    state.xp += ex.xp;
  }
  checkBadges();
  save();
  const after = levelForXp(state.xp).level;
  render();
  if(day.done[exId]){
    const card = document.querySelector(`[data-card="${exId}"]`);
    if(card){
      const f = document.createElement('span');
      f.className = 'xpfloat';
      f.textContent = '+' + ex.xp + ' XP';
      card.appendChild(f);
      setTimeout(() => f.remove(), 950);
    }
    if(after > before) toast('Level ' + after + ' — steady growth.');
    else if(fullyDone(today)) toast('Full Six — every branch tended today.');
  }
}

let saveTimers = {};
function debounced(key, fn){
  clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(fn, 350);
}
function flash(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1300);
}

document.addEventListener('click', e => {
  const nav = e.target.closest('[data-nav]');
  if(nav){ view = nav.dataset.nav; render(); return; }
  const act = e.target.closest('[data-act]');
  if(act){
    const a = act.dataset.act;
    if(a === 'theme'){ state.dark = !state.dark; save(); render(); }
    if(a === 'begin'){ state.onboarded = true; save(); render(); }
    if(a === 'export') doExport();
    if(a === 'import') $('#importFile').click();
    if(a === 'saveVerses') saveVerses();
    if(a === 'reset') doReset();
    return;
  }
  const chk = e.target.closest('[data-check]');
  if(chk){ e.stopPropagation(); toggleExercise(chk.dataset.check); return; }
  const card = e.target.closest('[data-card]');
  if(card){ toggleExercise(card.dataset.card); }
});

document.addEventListener('input', e => {
  const t = e.target;
  if(t.dataset.ex !== undefined){
    const ex = state.exercises[Number(t.dataset.ex)];
    const f = t.dataset.f;
    if(!ex || !f) return;
    ex[f] = (f === 'duration_seconds' || f === 'xp') ? Math.max(1, Number(t.value) || 1) : t.value;
    debounced('ex', () => { save(); flash('exSaved'); });
    return;
  }
  if(t.dataset.review !== undefined){
    const today = todayStr();
    if(!state.reviews[today]) state.reviews[today] = ['','',''];
    state.reviews[today][Number(t.dataset.review)] = t.value;
    debounced('review', () => { save(); flash('reviewSaved'); });
    return;
  }
  if(t.dataset.set){
    const k = t.dataset.set;
    state[k] = Number(t.value);
    if(k === 'graceAllowance') state.graceAllowance = Math.max(0, Math.min(7, state.graceAllowance || 0));
    save();
    if(k === 'sabbathDay') render();
  }
});
document.addEventListener('change', e => {
  if(e.target.id === 'importFile') doImport(e.target.files[0]);
});

/* ---------- verses save ---------- */
function saveVerses(){
  const box = $('#verseBox');
  const lines = box.value.split('\n').map(l => l.trim()).filter(Boolean);
  const parsed = [];
  for(const line of lines){
    const i = line.indexOf('|');
    if(i > 0) parsed.push({ ref: line.slice(0,i).trim(), text: line.slice(i+1).trim() });
    else parsed.push({ ref: '', text: line });
  }
  if(!parsed.length){ toast('Add at least one verse'); return; }
  state.verses = parsed;
  save();
  toast('Verse rotation saved');
}

/* ---------- export / import / reset ---------- */
function doExport(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'abide-backup-' + todayStr() + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
  toast('Backup exported');
}
function doImport(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(typeof data !== 'object' || !data || !Array.isArray(data.exercises) || typeof data.log !== 'object'){
        toast('That file doesn’t look like an Abide backup'); return;
      }
      const days = Object.keys(data.log || {}).length;
      if(!confirm('Replace current data with this backup? (' + days + ' logged day' + (days===1?'':'s') + ', ' + (data.xp||0) + ' XP)')) return;
      state = Object.assign(seedState(), data);
      processRollover();
      save();
      render();
      toast('Backup imported');
    }catch(err){ toast('Could not read that file'); }
  };
  reader.readAsText(file);
  $('#importFile').value = '';
}
function doReset(){
  if(!confirm('Erase all Abide data — exercises, history, XP, badges? This cannot be undone.')) return;
  if(!confirm('Last check: you’re sure? Consider exporting a backup first.')) return;
  state = seedState(); // light theme, onboarding, fresh seed
  save();
  view = 'today';
  render();
}

/* ---------- day rollover (local-date, survives closed tab / midnight) ---------- */
function checkDay(){
  if(todayStr() !== renderedDay){
    processRollover();
    render();
  }
}
document.addEventListener('visibilitychange', () => { if(!document.hidden) checkDay(); });
window.addEventListener('focus', checkDay);
setInterval(checkDay, 60 * 1000);

/* ---------- boot ---------- */
processRollover();
render();

// small debug/backup handle (harmless; used by the owner or tests)
window.Abide = {
  get state(){ return state; },
  set state(s){ state = s; save(); render(); },
  save, render, processRollover, streak, todayStr, addDays, levelForXp,
};
</script>
</body>
</html>
